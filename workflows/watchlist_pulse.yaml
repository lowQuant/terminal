name: Watchlist Pulse
description: >
  A quick health check of your active worksheet — live quotes + top
  movers + any upcoming earnings in the names you're tracking.
focus: >
  Surface which of the user's names are leading and lagging today,
  whether any of them have earnings coming up that explain outsized
  moves, and whether anything in recent news flow is worth flagging.
  Ground every claim in the numbers returned by W and EVTS.

inputs: {}

steps:
  - id: watchlist
    tool: W
    label: Live watchlist quotes

  - id: earnings
    tool: EVTS
    label: Earnings on deck
    params:
      country: US
      days: 14
      limit: 40

tags:
  - daily
  - portfolio
  - watchlist

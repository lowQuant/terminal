name: Daily Macro Brief
description: >
  Quick market temperature check — top US gainers, losers, and earnings
  catalysts on deck for the next week. Good morning-coffee routine.
focus: >
  Identify which sectors are leading, which names have outsized moves,
  and whether any upcoming earnings catalysts line up with the movers.
  Flag anything that looks like positioning for a specific narrative.

inputs:
  country:
    type: string
    default: US
  days:
    type: integer
    default: 7

steps:
  - id: gainers
    tool: MOST
    label: Top gainers
    parallel_group: market_scan
    params:
      country: "{{inputs.country}}"
      view: gainers
      limit: 10

  - id: losers
    tool: MOST
    label: Top losers
    parallel_group: market_scan
    params:
      country: "{{inputs.country}}"
      view: losers
      limit: 10

  - id: active
    tool: MOST
    label: Most active
    parallel_group: market_scan
    params:
      country: "{{inputs.country}}"
      view: active
      limit: 10

  - id: earnings
    tool: EVTS
    label: Earnings ahead
    params:
      country: "{{inputs.country}}"
      days: "{{inputs.days}}"
      limit: 20

tags:
  - macro
  - daily
  - screening
